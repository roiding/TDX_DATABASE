# TDX Database 配置文件
# 复制此文件为 config.yaml 并填入真实信息
# MySQL 连接信息优先从环境变量读取：MYSQL_HOST / MYSQL_PORT / MYSQL_USER / MYSQL_PASSWORD / MYSQL_DATABASE
# 环境变量未设置时，才回退到下面的 yaml 值

mysql:
  host: "your-cloud-mysql-host"
  port: 3306
  user: "root"
  password: "your-password"
  database: "tdx_data"
  charset: "utf8mb4"
  # 连接池配置
  pool_size: 5
  pool_recycle: 3600

# TDX行情服务器：自动从 pytdx 内置104台中选最快的，无需手动配置

# 同步配置
sync:
  # 每次API请求获取的K线条数（pytdx上限800）
  batch_size: 800
  # 单只股票最大回溯页数（5min需约30页覆盖700天，1min需约22页覆盖100天）
  max_pages: 50
  # 失败重试次数
  max_retries: 3
  # 批量写入数据库的行数
  db_batch_size: 5000

  # 全量铺底：更激进的吞吐配置
  full_workers: 4
  full_request_interval: 0.01
  full_progress_log_interval: 20

  # 每日增量：更保守，稳定优先
  daily_workers: 1
  daily_request_interval: 0.1

  # 兼容旧配置（如未拆分则回退使用）
  request_interval: 0.1
  workers: 1

  # 每日自动增量同步时间（24h制，工作日触发）
  daily_hour: 16
  daily_minute: 30

# 日志配置
logging:
  level: "INFO"
  file: "logs/tdx_sync.log"
  rotation: "10 MB"
  retention: "30 days"
