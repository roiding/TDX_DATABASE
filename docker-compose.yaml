services:
  tdx-sync:
    build: .
    environment:
      - MYSQL_HOST=your-cloud-mysql-host
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=your-password
      - MYSQL_DATABASE=tdx_data
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    # 默认每日增量，可改为 ["full"] 做全量铺底
    command: ["daily"]
    restart: "no"
